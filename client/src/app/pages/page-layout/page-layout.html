<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-acronym">{{ 'brand.acronym' | translate }}</span>
      <span class="brand-subtitle">Personal Travel Plan</span>
    </div>
    <nav class="nav-links">
      <a class="nav-link active" aria-current="page" routerLink="/journeys">{{ 'nav.journey' | translate }}</a>
      <a class="nav-link">{{ 'nav.company' | translate }}</a>
      <a class="nav-link">{{ 'nav.customer' | translate }}</a>
    </nav>
    <div class="language-switch">
      <span class="lang-option" [class.active]="translate.currentLang() === 'en'" (click)="switchLang('en')">EN</span>
      <span class="lang-sep">|</span>
      <span class="lang-option" [class.active]="translate.currentLang() === 'fr'" (click)="switchLang('fr')">FR</span>
    </div>
  </div>
</header>

<ng-content />
