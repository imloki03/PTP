<app-page-layout>

<!-- Page Heading -->
<section class="page-heading">
  <div class="heading-left">
    <h1 class="page-title">{{ 'page.title' | translate }}</h1>
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <ol>
        <li><a routerLink="/">{{ 'page.breadcrumbHome' | translate }}</a></li>
        <li><span aria-current="page">{{ 'page.breadcrumbCurrent' | translate }}</span></li>
      </ol>
    </nav>
  </div>
  <app-button variant="mint" (onClick)="onNewJourney()">{{ 'page.newJourney' | translate }}</app-button>
</section>

<!-- Main Card -->
<main class="journey-card">
  <app-journey-search-panel
    [initialFilter]="initialFilter()"
    (onSearch)="onSearch($event)"
    (onReset)="onReset()"
  />
  <div class="card-divider"></div>
  <app-journey-table
    [journeys]="journeys()"
    [totalElements]="totalElements()"
    [pageSize]="pageSize()"
    [pageIndex]="page()"
    [selectedIds]="selectedIds()"
    [allSelected]="allSelected"
    (toggleAll)="onToggleAll()"
    (toggleRow)="onToggleRow($event)"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)"
    (deleteSelected)="onDeleteSelected()"
    (onPageChange)="onPageChange($event)"
  />
</main>

</app-page-layout>
