<mat-form-field [style.width]="'100%'" [appearance]="'outline'">
  @if (label()) {
    <mat-label>{{ label() }}</mat-label>
  }
  @if (multiline()) {
    <textarea matInput [placeholder]="placeholder()" [(ngModel)]="value" rows="3"></textarea>
  } @else {
    <input matInput [type]="type()" [placeholder]="placeholder()" [(ngModel)]="value" />
  }
</mat-form-field>
