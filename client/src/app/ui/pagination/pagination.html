<div class="pagination-wrapper">
  <span class="entry-summary">{{ 'pagination.showing' | translate:{ start: startEntry, end: endEntry, total: totalElements() } }}</span>
  <mat-paginator
    [length]="totalElements()"
    [pageSize]="pageSize()"
    [pageIndex]="pageIndex()"
    [pageSizeOptions]="[5, 10, 20]"
    [showFirstLastButtons]="true"
    (page)="onPageChange.emit($event)"
  />
</div>
